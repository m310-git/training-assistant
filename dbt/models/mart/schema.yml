version: 2

models:
  - name: d_body_part
    description: "部位マスタ（6部位）"
    columns:
      - name: body_part_id
        tests: [unique, not_null]

  - name: d_exercise
    description: "種目マスタ（有効のみ）"
    columns:
      - name: exercise_id
        tests: [unique, not_null]
      - name: body_part_id
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['chest', 'back', 'shoulder', 'leg', 'arm', 'other']

  - name: d_user
    description: "ユーザーマスタ（有効のみ）"
    columns:
      - name: user_id
        tests: [unique, not_null]

  - name: fct_training_set
    description: "トレーニングファクトテーブル"
    columns:
      - name: log_id
        tests: [unique, not_null]
      - name: user_id
        tests: [not_null]
      - name: training_date
        tests: [not_null]
      - name: weight_kg
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500
      - name: reps
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 100
      - name: rpe
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 6.0
              max_value: 10.0
      - name: volume
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 50000

  - name: m_ml_suggestion
    description: "BigQuery ML予測結果。次回の推奨重量・回数。"
    columns:
      - name: user_id
        tests: [not_null]
      - name: exercise_id
        tests: [not_null]
      - name: suggested_weight_kg
        tests: [not_null]
      - name: suggested_reps
        tests: [not_null]
      - name: model_version
        tests: [not_null]